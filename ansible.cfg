[defaults]
inventory         = inventory.yml
roles_path        = roles
strategy          = linear
localhost_warning = False

# Run this playbook directly on dom0:
#   ansible-playbook playbooks/main.yml
#
# The qubesos_strategy_guard callback (installed globally on this dom0) aborts
# any play that uses ansible_connection:qubes without qubes_proxy strategy.
# We opt out below because this testbed uses the qubes connection plugin
# directly with the linear strategy, which is intentional for a dev testbed.
#
# To use the full qubes_proxy strategy (management DispVM infrastructure),
# point strategy_plugins at the qubes-ansible plugins directory and
# set strategy=qubes_proxy; also remove the qubes_allow_insecure override.
#   strategy_plugins = /home/user/qubes-ansible/plugins/strategy
#   strategy          = qubes_proxy

[qubesos_strategy_guard]
qubes_allow_insecure = true
qubes_insecure_quiet = true
